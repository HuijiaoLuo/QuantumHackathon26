name: Qubit Simulator CI

# Trigger the workflow on push or pull request for main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Use the latest Ubuntu runner
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install the project in editable mode with test dependencies
        # This uses your updated pyproject.toml configuration
        pip install -e ".[test]"
        
    - name: Execute automated tests
      run: |
        # Since the project is installed with -e, 
        # PYTHONPATH is handled automatically by site-packages
        pytest test_main.py -v -s
