name: Qubit Simulator CI

# Trigger the workflow on push or pull request for main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Use the latest Ubuntu runner
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install core dependencies and pytest for testing
        pip install .
        # If you have a pyproject.toml, you can also run: pip install .
        
    - name: Execute automated tests
      run: |
        # Run pytest on the test script
        # -v: verbose output, -s: show print statements in console
        pytest test_main.py -v -s
