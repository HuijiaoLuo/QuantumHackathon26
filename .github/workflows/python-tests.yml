name: Qubit Simulator CI

# Trigger the workflow on push or pull request for main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    # Use the latest Ubuntu runner
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Directly install required libraries instead of building the package
        pip install numpy>=2.4 laboneq==26.4.0 qutip>=5.2 matplotlib>=3.10 pytest
        
    - name: Execute automated tests
      run: |
        # Manually set PYTHONPATH to include 'optimized' and root
        # This allows test_main.py to find your modules without 'pip install .'
        export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/optimized
        pytest test_main.py -v -s
